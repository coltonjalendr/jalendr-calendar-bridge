<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Jalendr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #fff;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #888;
      font-size: 13px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      background: #2563eb;
      color: #fff;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .btn:disabled {
      background: #333;
      cursor: not-allowed;
    }

    .message {
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .message.error {
      background: #1f1315;
      border: 1px solid #7f1d1d;
      color: #ef4444;
      display: block;
    }

    .message.success {
      background: #0f291a;
      border: 1px solid #166534;
      color: #22c55e;
      display: block;
    }

    .back-link {
      margin-top: 20px;
      font-size: 13px;
    }

    .back-link a {
      color: #666;
      text-decoration: none;
    }

    .back-link a:hover {
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="/logo.png" alt="Jalendr" class="logo">
    <h1>Customer Login</h1>
    <p class="subtitle">Enter your email to receive a login link</p>

    <div id="message" class="message"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">
        <span id="btn-text">Send Login Link</span>
      </button>
    </form>

    <div class="back-link">
      <a href="/">Back to home</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');

    // Check for error in URL
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');

    if (error === 'invalid') {
      showMessage('Invalid login link. Please request a new one.', 'error');
    } else if (error === 'expired') {
      showMessage('Login link has expired. Please request a new one.', 'error');
    } else if (error === 'failed') {
      showMessage('Login failed. Please try again.', 'error');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();

      if (!email) {
        showMessage('Please enter your email address.', 'error');
        return;
      }

      // Disable button and show loading
      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>Sending...';

      try {
        const res = await fetch('/auth/magic-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showMessage('Check your email for a login link. It will expire in 15 minutes.', 'success');
          form.reset();
        } else {
          showMessage(data.message || 'Failed to send login link. Please try again.', 'error');
        }
      } catch (err) {
        showMessage('Something went wrong. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = 'Send Login Link';
      }
    });

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + type;
    }
  </script>
</body>
</html>

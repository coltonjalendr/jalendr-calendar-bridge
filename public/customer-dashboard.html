<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Jalendr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #222;
    }

    .header h1 {
      font-size: 24px;
      color: #fff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .company-name {
      color: #666;
      font-size: 14px;
    }

    .logout-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      border-color: #555;
      color: #fff;
    }

    /* Stats Grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
    }

    .stat-label {
      color: #666;
      font-size: 13px;
      margin-top: 5px;
    }

    /* Section */
    .section {
      margin-bottom: 30px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .section h2 {
      font-size: 18px;
      color: #888;
    }

    /* Cards */
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }

    .card:last-child {
      margin-bottom: 0;
    }

    /* Appointment Card */
    .appointment-card {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .appointment-time {
      font-size: 16px;
      font-weight: 600;
      color: #2563eb;
      min-width: 80px;
    }

    .appointment-info h3 {
      font-size: 15px;
      margin-bottom: 4px;
      color: #fff;
    }

    .appointment-info p {
      color: #666;
      font-size: 13px;
    }

    /* Lead Card */
    .lead-card {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .lead-info h3 {
      font-size: 15px;
      margin-bottom: 4px;
      color: #fff;
    }

    .lead-info p {
      color: #666;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .lead-info .notes {
      color: #888;
      font-style: italic;
      margin-top: 8px;
    }

    .lead-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-new {
      background: #1e3a5f;
      color: #60a5fa;
    }

    .badge-contacted {
      background: #0f291a;
      color: #22c55e;
    }

    .badge-gray {
      background: #1a1a1a;
      color: #666;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #222;
      color: #fff;
    }

    .btn-secondary:hover {
      background: #333;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid #333;
      border-radius: 50%;
      border-top-color: #2563eb;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Login redirect screen */
    .login-redirect {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: -20px;
    }

    .redirect-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
    }

    .redirect-box h2 {
      color: #fff;
      margin-bottom: 15px;
    }

    .redirect-box p {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .redirect-box .btn {
      padding: 12px 24px;
      font-size: 14px;
    }

    .hidden { display: none !important; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }

    .tab {
      padding: 8px 16px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 13px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tab.active {
      background: #1a1a1a;
      color: #fff;
    }

    .tab:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- Login Required Screen -->
  <div id="login-required" class="login-redirect hidden">
    <div class="redirect-box">
      <h2>Session Expired</h2>
      <p>Please log in again to access your dashboard.</p>
      <a href="/login.html" class="btn btn-primary">Go to Login</a>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="container hidden">
    <div class="header">
      <h1>Dashboard</h1>
      <div class="header-right">
        <span class="company-name" id="company-name"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-today">-</div>
        <div class="stat-label">Today's Appointments</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-week">-</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-new-leads">-</div>
        <div class="stat-label">New Leads</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-total-leads">-</div>
        <div class="stat-label">Total Leads</div>
      </div>
    </div>

    <!-- Today's Appointments -->
    <div class="section">
      <div class="section-header">
        <h2>Today's Appointments</h2>
      </div>
      <div id="appointments-list">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- Leads -->
    <div class="section">
      <div class="section-header">
        <h2>Leads</h2>
        <div class="tabs">
          <button class="tab active" data-filter="new">New</button>
          <button class="tab" data-filter="contacted">Contacted</button>
          <button class="tab" data-filter="all">All</button>
        </div>
      </div>
      <div id="leads-list">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </div>
  </div>

  <script>
    let sessionToken = null;
    let allLeads = [];
    let currentFilter = 'new';

    // Initialize
    init();

    async function init() {
      // Get session from URL or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      sessionToken = urlParams.get('session') || localStorage.getItem('jalendr_session');

      if (urlParams.get('session')) {
        // Store in localStorage and clean URL
        localStorage.setItem('jalendr_session', sessionToken);
        window.history.replaceState({}, document.title, '/customer-dashboard.html');
      }

      if (!sessionToken) {
        showLoginRequired();
        return;
      }

      // Verify session by loading stats
      try {
        const stats = await apiFetch('/customer/stats');
        if (!stats.success) {
          throw new Error('Invalid session');
        }

        // Session valid - show dashboard
        showDashboard();
        updateStats(stats.stats);
        loadAppointments();
        loadLeads();
      } catch (err) {
        console.error('Session invalid:', err);
        localStorage.removeItem('jalendr_session');
        showLoginRequired();
      }
    }

    // API helper
    async function apiFetch(url, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${sessionToken}`,
        ...options.headers
      };

      const res = await fetch(url, { ...options, headers });

      if (res.status === 401) {
        localStorage.removeItem('jalendr_session');
        showLoginRequired();
        throw new Error('Unauthorized');
      }

      return res.json();
    }

    function showLoginRequired() {
      document.getElementById('login-required').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('login-required').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }

    function updateStats(stats) {
      document.getElementById('stat-today').textContent = stats.todayAppointments;
      document.getElementById('stat-week').textContent = stats.weekAppointments;
      document.getElementById('stat-new-leads').textContent = stats.newLeads;
      document.getElementById('stat-total-leads').textContent = stats.totalLeads;
    }

    async function loadAppointments() {
      try {
        const data = await apiFetch('/customer/appointments/today');
        const list = document.getElementById('appointments-list');

        if (!data.appointments || data.appointments.length === 0) {
          list.innerHTML = '<div class="empty-state">No appointments scheduled for today.</div>';
          return;
        }

        list.innerHTML = data.appointments.map(apt => `
          <div class="card appointment-card">
            <div class="appointment-time">${apt.startFormatted}</div>
            <div class="appointment-info">
              <h3>${escapeHtml(apt.summary)}</h3>
              ${apt.description ? `<p>${escapeHtml(extractCustomerInfo(apt.description))}</p>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load appointments:', err);
        document.getElementById('appointments-list').innerHTML =
          '<div class="empty-state">Failed to load appointments.</div>';
      }
    }

    async function loadLeads() {
      try {
        const data = await apiFetch('/customer/leads');
        allLeads = data.leads || [];
        renderLeads();
      } catch (err) {
        console.error('Failed to load leads:', err);
        document.getElementById('leads-list').innerHTML =
          '<div class="empty-state">Failed to load leads.</div>';
      }
    }

    function renderLeads() {
      const list = document.getElementById('leads-list');

      let filtered = allLeads;
      if (currentFilter === 'new') {
        filtered = allLeads.filter(l => l.status === 'new');
      } else if (currentFilter === 'contacted') {
        filtered = allLeads.filter(l => l.status === 'contacted');
      }

      if (filtered.length === 0) {
        const msg = currentFilter === 'new' ? 'No new leads.' :
                    currentFilter === 'contacted' ? 'No contacted leads.' :
                    'No leads yet.';
        list.innerHTML = `<div class="empty-state">${msg}</div>`;
        return;
      }

      list.innerHTML = filtered.map(lead => `
        <div class="card lead-card" id="lead-${lead.id}">
          <div class="lead-info">
            <h3>${escapeHtml(lead.name || 'Unknown')}</h3>
            <p>${escapeHtml(lead.phone || 'No phone')}${lead.address ? ' - ' + escapeHtml(lead.address) : ''}</p>
            <p>${escapeHtml(lead.job_type || 'No job type specified')}</p>
            ${lead.notes ? `<p class="notes">"${escapeHtml(lead.notes)}"</p>` : ''}
          </div>
          <div class="lead-actions">
            <span class="badge ${lead.status === 'new' ? 'badge-new' : 'badge-contacted'}">${lead.status}</span>
            ${lead.status === 'new' ? `
              <button class="btn btn-primary" onclick="markContacted('${lead.id}')">Mark Contacted</button>
            ` : ''}
            <span style="color: #666; font-size: 11px;">${formatDate(lead.created_at)}</span>
          </div>
        </div>
      `).join('');
    }

    async function markContacted(leadId) {
      const btn = document.querySelector(`#lead-${leadId} .btn-primary`);
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Updating...';
      }

      try {
        const data = await apiFetch(`/customer/leads/${leadId}`, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'contacted' })
        });

        if (data.success) {
          // Update local data
          const lead = allLeads.find(l => l.id === leadId);
          if (lead) lead.status = 'contacted';

          // Update stats
          const newCount = allLeads.filter(l => l.status === 'new').length;
          document.getElementById('stat-new-leads').textContent = newCount;

          renderLeads();
        }
      } catch (err) {
        console.error('Failed to update lead:', err);
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Mark Contacted';
        }
      }
    }

    function logout() {
      apiFetch('/auth/logout', { method: 'POST' }).catch(() => {});
      localStorage.removeItem('jalendr_session');
      window.location.href = '/login.html';
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderLeads();
      });
    });

    // Helpers
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function extractCustomerInfo(description) {
      if (!description) return '';
      // Extract phone from description
      const phoneMatch = description.match(/Phone:\s*([^\n]+)/);
      return phoneMatch ? phoneMatch[1].trim() : '';
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
  </script>
</body>
</html>
